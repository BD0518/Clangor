name: "💡 Feature Suggestion / 奇思广议"
description: "Share an idea to improve Clangor. / 集思广益，丰器鸣之响。"
title: "[Suggestion]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for your interest! I'd love to hear your thoughts. 愿闻高见。

  - type: textarea
    id: content
    attributes:
      label: "What's on your mind? / 见解与构想"
      description: "Share your idea – images, videos, or links are also welcome. 尽可畅谈，图片、链接亦可附上。"
      placeholder: "I think it would be cool if... / 若器鸣能……"
    validations:
      required: true
